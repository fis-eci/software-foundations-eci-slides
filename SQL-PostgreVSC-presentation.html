      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Stage: the area above the nav bar where the slide lives */
    #stage {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 52px;
      overflow: hidden;
    }

    /* The iframe is positioned absolutely and scaled via JS transform */
    #slide-frame {
      position: absolute;
      top: 0; left: 0;
      width: 1280px;
      height: 720px;
      border: none;
      display: block;
      transform-origin: top left;
      /* transform is set dynamically by scaleSlide() */
    }

    /* Progress bar sits just above the nav bar */
    #progress-wrap {
      position: fixed;
      bottom: 52px; left: 0; right: 0;
      height: 3px;
      background: #21262d;
      z-index: 9998;
    }
    #progress-bar {
      height: 100%;
      background: #58a6ff;
      transition: width 0.2s ease;
    }

    /* Navigation bar */
    #nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(13, 17, 23, 0.97);
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      z-index: 9999;
    }

    .nbtn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px 13px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .nbtn:hover  { background: #30363d; }
    .nbtn:disabled { opacity: 0.3; cursor: default; }

    #counter {
      color: #8b949e;
      font-size: 13px;
      flex-shrink: 0;
      min-width: 52px;
      text-align: center;
    }

    #slide-title {
      color: #c9d1d9;
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #jump-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    #jump-label { color: #8b949e; font-size: 12px; }
    #jump-input {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 13px;
      width: 48px;
      text-align: center;
    }
    #jump-input:focus { outline: none; border-color: #58a6ff; }

    #btn-fs {
      background: transparent;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 15px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #btn-fs:hover { color: #c9d1d9; background: #21262d; }

    .hint { color: #484f58; font-size: 11px; flex-shrink: 0; }
  </style>
</head>

  </div>

    <div class="dot"></div>

  <div data-object="true" data-object-type="textbox" class="avoid" style="position:absolute;top:204px;left:754px;width:476px;height:330px;">

      <li><i class="fa-solid fa-times-circle"></i><span>Ejecutar todo el archivo .sql sin selección específica</span></li>
    </ul>

  .tc1{position:absolute;width:300px;height:300px;border:1px dashed rgba(79,195,247,0.15);border-radius:50%;top:-90px;right:-80px;}
  .gd1{position:absolute;width:10px;height:10px;border-radius:50%;background:#4FC3F7;box-shadow:0 0 20px #4FC3F7;top:140px;left:40px;}
  .gd2{position:absolute;width:10px;height:10px;border-radius:50%;background:#FF6B35;box-shadow:0 0 20px #FF6B35;bottom:200px;right:60px;}

  .hb{position:absolute;top:0;left:0;width:1280px;height:80px;background:rgba(13,27,62,0.9);border-bottom:1px solid rgba(79,195,247,0.2);}
  .chip{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;color:#4FC3F7;background:rgba(79,195,247,0.1);border:1px solid rgba(79,195,247,0.3);padding:6px 14px;border-radius:4px;}
  .h-title{font-family:'Orbitron',sans-serif;font-weight:700;font-size:25px;color:#F0F4F8;}

  .table{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-left:4px solid #4FC3F7;border-radius:10px;padding:0;overflow:hidden;box-sizing:border-box;}
  .table .th{display:grid;grid-template-columns:190px 1fr;background:rgba(79,195,247,0.08);padding:13px 20px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1.2px;color:#4FC3F7;border-bottom:1px solid rgba(79,195,247,0.2);}
  .table .tr{display:grid;grid-template-columns:190px 1fr;padding:13px 20px;border-bottom:1px solid rgba(255,255,255,0.06);font-family:'Roboto',sans-serif;font-size:13.5px;align-items:center;}
  .table .tr:last-child{border-bottom:none;}
  .table .tr .field{color:#8B949E;font-family:'JetBrains Mono',monospace;font-size:12.5px;}
  .table .tr .val{color:#F0F4F8;}
  .table .tr .val code{font-family:'JetBrains Mono',monospace;color:#4FC3F7;font-size:12.5px;background:rgba(79,195,247,0.08);padding:1px 6px;border-radius:3px;}

  .diff{background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.25);border-left:4px solid #FF6B35;border-radius:10px;padding:18px 22px;box-sizing:border-box;}
  .diff .dh{display:flex;align-items:center;gap:10px;font-family:'Roboto',sans-serif;font-size:14px;font-weight:700;color:#FF6B35;margin-bottom:10px;letter-spacing:0.4px;}
  .diff .dh i{font-size:18px;}
  .diff .dtxt{font-family:'Roboto',sans-serif;font-size:13.5px;color:#F0F4F8;line-height:1.6;}
  .diff .dtxt b{color:#FF6B35;}

  .stepslist .sitem:last-child{margin-bottom:0;}
  .stepslist .snum{width:26px;height:26px;border-radius:50%;background:rgba(79,195,247,0.15);color:#4FC3F7;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(79,195,247,0.4);}

  .stepslist .stxt b{color:#4FC3F7;font-family:'JetBrains Mono',monospace;font-size:12.5px;}
  .stepslist .stxt em{color:#00FF88;font-style:normal;font-family:'JetBrains Mono',monospace;font-size:12px;}

  .codebox{background:rgba(13,27,62,0.65);border:1px solid rgba(0,122,204,0.3);border-left:4px solid #007ACC;border-radius:10px;padding:16px 20px;box-sizing:border-box;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#C9D1D9;line-height:1.8;}

  .bottomnote{background:rgba(46,164,79,0.07);border:1px solid rgba(46,164,79,0.3);border-left:4px solid #2EA44F;border-radius:8px;padding:14px 22px;display:flex;align-items:center;gap:14px;box-sizing:border-box;}
  .bottomnote i{color:#2EA44F;font-size:20px;flex-shrink:0;}
  .bottomnote span{font-family:'Roboto',sans-serif;font-size:13.5px;color:#F0F4F8;line-height:1.45;}
  .bottomnote b{color:#2EA44F;}
  .bottomnote code{font-family:'JetBrains Mono',monospace;color:#2EA44F;font-size:12.5px;background:rgba(46,164,79,0.1);padding:1px 5px;border-radius:3px;}

  .tricolor{position:absolute;bottom:0;left:0;width:1280px;height:6px;display:flex;}
  .tricolor div:nth-child(1){background:#336791;flex:1;}

<div class="slide-container">
  <div data-object="true" data-object-type="shape" class="tc1"></div>
  <div data-object="true" data-object-type="shape" class="gd1"></div>
  <div data-object="true" data-object-type="shape" class="gd2"></div>

  <div data-object="true" data-object-type="shape" class="hb" style="position:absolute;top:0;left:0;width:1280px;height:80px;"></div>
  <div data-object="true" data-object-type="textbox" style="position:absolute;top:30px;left:50px;"><span class="chip">CONEXIÓN REMOTA</span></div>
  <div data-object="true" data-object-type="shape" style="position:absolute;top:25px;left:215px;width:1px;height:30px;background:rgba(255,255,255,0.15);"></div>
  <div data-object="true" data-object-type="textbox" style="position:absolute;top:28px;left:240px;">
    <div class="h-title">A. Conexión al Servidor PostgreSQL de la Escuela</div>
  </div>

  <!-- Left: parameters table -->
  <div data-object="true" data-object-type="table" class="table" style="position:absolute;top:100px;left:50px;width:680px;">
    <div class="th"><span>Campo</span><span>Valor</span></div>
    <div class="tr"><span class="field">Connection Name</span><span class="val"><code>Escuela-Postgre</code> (nombre descriptivo)</span></div>
    <div class="tr"><span class="field">Server / Host</span><span class="val">Dirección proporcionada por el profesor</span></div>
    <div class="tr"><span class="field">Port</span><span class="val"><code>5432</code> (estándar PostgreSQL)</span></div>
    <div class="tr"><span class="field">Database</span><span class="val">Nombre de la base de datos asignada</span></div>
    <div class="tr"><span class="field">Username</span><span class="val">Tu usuario de acceso</span></div>
    <div class="tr"><span class="field">Password</span><span class="val">Tu contraseña de acceso</span></div>
  </div>

  <!-- Left bottom: diff vs Oracle -->
  <div data-object="true" data-object-type="textbox" class="diff" style="position:absolute;top:424px;left:50px;width:680px;">
    <div class="dh"><i class="fa-solid fa-lightbulb"></i>DIFERENCIA CLAVE VS. ORACLE</div>
    <div class="dtxt">
      En PostgreSQL <b>NO existe el concepto de SID</b> como en Oracle. La base de datos se identifica directamente por su <b>NOMBRE</b> (campo <code>Database</code>).<br>
      Cada estudiante trabaja dentro de su propio <b>esquema</b> — no en bases de datos separadas.
    </div>
  </div>

  <!-- Right: steps -->
  <div data-object="true" data-object-type="textbox" class="stepslist" style="position:absolute;top:100px;left:750px;width:480px;">
    <div class="sh">5 PASOS PARA CREAR LA CONEXIÓN</div>
    <div class="sitem">
      <div class="snum">1</div>
      <div class="stxt">Ícono de <b>SQLTools</b> en barra lateral → <b>Add New Connection</b></div>
    </div>
    <div class="sitem">
      <div class="snum">2</div>
      <div class="stxt">Seleccionar <b>PostgreSQL</b> en la lista de drivers disponibles</div>
    </div>
    <div class="sitem">
      <div class="snum">3</div>
      <div class="stxt">Completar el formulario con los parámetros de la tabla izquierda</div>
    </div>
    <div class="sitem">
      <div class="snum">4</div>
      <div class="stxt"><b>Test Connection</b> → espera el mensaje <em>"Connected successfully"</em></div>
    </div>
    <div class="sitem">
      <div class="snum">5</div>
      <div class="stxt"><b>Save Connection</b> — queda guardada para próximas sesiones</div>
    </div>
  </div>

  <!-- Right: panel de árbol SQLTools -->
  <div data-object="true" data-object-type="textbox" class="codebox" style="position:absolute;top:422px;left:750px;width:480px;">
    <span style="color:#007ACC;font-weight:700;">// Panel lateral de SQLTools</span><br>
    Connections<br>
    &nbsp;&nbsp;└── <span style="color:#4FC3F7;">Escuela-Postgre</span>&nbsp;&nbsp;<span style="color:#00FF88;">●</span> connected<br>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;└── <span style="color:#FFB347;">schemas</span><br>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;├── <span style="color:#F0F4F8;">tu_usuario</span>&nbsp;&nbsp;<span style="color:#8B949E;">← tu esquema</span><br>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;└── <span style="color:#F0F4F8;">public</span>
  </div>

  <!-- Bottom note (full width) -->
  <div data-object="true" data-object-type="textbox" class="bottomnote" style="position:absolute;top:604px;left:50px;width:1180px;">
    <i class="fa-solid fa-circle-info"></i>
    <span>Si la conexión falla, verifica que estés en la <b>red de la Escuela</b> o conectado via <b>VPN institucional</b>. El servidor no es accesible desde redes externas sin VPN. El puerto es siempre <code>5432</code>.</span>
  </div>

  <div data-object="true" data-object-type="textbox" class="footer-r" style="position:absolute;bottom:14px;right:50px;"></div>
  <div data-object="true" data-object-type="shape" class="tricolor" style="position:absolute;bottom:0;left:0;width:1280px;height:6px;">
    <div></div><div></div><div></div>
  </div>
</div>
</body>
</html>

    var btnNext  = document.getElementById('btn-next');
    var jumpIn   = document.getElementById('jump-input');

    var cur = 0;

    function scaleSlide() {
      var stageW = window.innerWidth;
      var stageH = window.innerHeight - NAV_H;
      var s      = Math.min(stageW / 1280, stageH / 720);
      var offX   = (stageW - 1280 * s) / 2;
      var offY   = (stageH - 720  * s) / 2;
      frame.style.transform = 'translate(' + offX + 'px, ' + offY + 'px) scale(' + s + ')';
    }

    function goTo(n) {
      cur = Math.max(0, Math.min(n, TOTAL - 1));
      frame.srcdoc    = SLIDES[cur];
      counterEl.textContent = (cur + 1) + ' / ' + TOTAL;
      titleEl.textContent   = TITLES[cur] || '';
      progEl.style.width    = ((cur + 1) / TOTAL * 100) + '%';
      btnPrev.disabled = cur === 0;
      btnNext.disabled = cur === TOTAL - 1;
      jumpIn.value     = cur + 1;
      history.replaceState(null, '', '#' + (cur + 1));
    }

    btnNext.addEventListener('click', function() { goTo(cur + 1); });
    btnPrev.addEventListener('click', function() { goTo(cur - 1); });

    jumpIn.addEventListener('change', function() {
      var n = parseInt(this.value, 10);
      if (!isNaN(n)) goTo(n - 1);
    });
    jumpIn.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var n = parseInt(this.value, 10);
        if (!isNaN(n)) goTo(n - 1);
        frame.focus();
      }
    });

    document.addEventListener('keydown', function(e) {
      if (document.activeElement === jumpIn) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault(); goTo(cur + 1);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault(); goTo(cur - 1);
      } else if (e.key === 'Home') {
        e.preventDefault(); goTo(0);
      } else if (e.key === 'End') {
        e.preventDefault(); goTo(TOTAL - 1);
      } else if (e.key === 'f' || e.key === 'F') {
        toggleFs();
      }
    });

    document.getElementById('btn-fs').addEventListener('click', toggleFs);

    function toggleFs() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function() {});
      } else {
        document.exitFullscreen();
      }
    }

    window.addEventListener('resize', scaleSlide);
    window.addEventListener('fullscreenchange', scaleSlide);

    /* Restore slide from URL hash, default to slide 1 */
    var h = parseInt(location.hash.slice(1), 10);
    scaleSlide();
    goTo(isNaN(h) ? 0 : h - 1);
  </script>

</body>
</html>
