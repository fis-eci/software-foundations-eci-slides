<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portada — Análisis de Software en Eclipse IDE</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Roboto+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0D1117;
      color: #FFFFFF;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
    }
    .slide-container {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background-color: #0D1117;
      background-image: 
        linear-gradient(rgba(48, 54, 61, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(48, 54, 61, 0.3) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .card-accent-sonar { border-top: 4px solid #4A90D9; }
    .card-accent-pmd { border-top: 4px solid #F89820; }
    .card-accent-jacoco { border-top: 4px solid #2EA44F; }
    .card-accent-pit { border-top: 4px solid #DA3633; }
  </style>
</head>
<body>
  <div class="slide-container" data-screen-label="01 Portada">
    <!-- Glowing backgrounds -->
    <div data-object="true" data-object-type="shape" style="position: absolute; right: -100px; top: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(248, 152, 32, 0.15) 0%, transparent 70%); z-index: 1;"></div>
    <div data-object="true" data-object-type="shape" style="position: absolute; left: -100px; bottom: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(124, 92, 191, 0.15) 0%, transparent 70%); z-index: 1;"></div>

    <!-- Decorative background icons -->
    <div data-object="true" data-object-type="icon" style="position: absolute; left: 60px; top: 60px; font-size: 160px; color: #FFFFFF; opacity: 0.05; z-index: 1;">
      <i class="fa-brands fa-java"></i>
    </div>
    <div data-object="true" data-object-type="icon" style="position: absolute; right: 80px; bottom: 80px; font-size: 140px; color: #FFFFFF; opacity: 0.05; z-index: 1;">
      <i class="fa-solid fa-code"></i>
    </div>

    <!-- Badge superior -->
    <div data-object="true" data-object-type="textbox" style="position: absolute; left: 100px; top: 120px; width: 500px; z-index: 10;">
      <span style="display: inline-block; padding: 6px 14px; background-color: rgba(248, 152, 32, 0.1); border: 1px solid rgba(248, 152, 32, 0.3); border-radius: 20px; color: #F89820; font-family: 'Roboto Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">
        UNIDAD DE APRENDIZAJE • NIVEL PROFESIONAL
      </span>
    </div>

    <!-- Título principal -->
    <div data-object="true" data-object-type="textbox" style="position: absolute; left: 100px; top: 175px; width: 1080px; z-index: 10;">
      <h1 style="margin: 0; font-size: 58px; font-weight: 700; line-height: 1.15; color: #FFFFFF;">
        Análisis de Software en<br>
        <span style="color: #F89820; text-shadow: 0 0 30px rgba(248, 152, 32, 0.2);">Eclipse IDE</span>
      </h1>
      <p style="margin: 20px 0 0 0; font-size: 22px; color: #8B949E; font-weight: 300;">
        Guía para estudiantes de DOPO — De BlueJ al entorno profesional
      </p>
    </div>

    <!-- Author pill -->
    <div data-object="true" data-object-type="textbox" style="position: absolute; left: 100px; top: 380px; width: 500px; z-index: 10;">
      <div style="display: inline-flex; align-items: center; background: #161B22; border: 1px solid #30363D; padding: 8px 16px; border-radius: 30px;">
        <span style="width: 32px; height: 32px; border-radius: 50%; background: #F89820; color: #0D1117; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; margin-right: 12px; font-family: 'Roboto Mono', monospace;">A</span>
        <div>
          <div style="color: #FFFFFF; font-weight: 700; font-size: 14px; line-height: 1.2;">Andersson David Sánchez Méndez</div>
          <div style="color: #8B949E; font-size: 12px; font-family: 'Roboto Mono', monospace; line-height: 1.2;">Monitor DOPO</div>
        </div>
      </div>
    </div>

    <!-- 4 Tarjetas horizontales inferiores -->
    <div class="card-accent-sonar" data-object="true" data-object-type="shape" style="position: absolute; left: 100px; top: 480px; width: 250px; height: 140px; background-color: #161B22; border-radius: 0 0 8px 8px; border-left: 1px solid #30363D; border-right: 1px solid #30363D; border-bottom: 1px solid #30363D; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10;">
      <div style="padding: 20px;">
        <div style="color: #4A90D9; font-size: 28px; margin-bottom: 10px;"><i class="fa-solid fa-search"></i></div>
        <div style="color: #FFFFFF; font-weight: 700; font-size: 18px; margin-bottom: 4px;">SonarLint</div>
        <div style="color: #8B949E; font-size: 13px; font-family: 'Roboto Mono', monospace;">Diseño</div>
      </div>
    </div>

    <div class="card-accent-pmd" data-object="true" data-object-type="shape" style="position: absolute; left: 375px; top: 480px; width: 250px; height: 140px; background-color: #161B22; border-radius: 0 0 8px 8px; border-left: 1px solid #30363D; border-right: 1px solid #30363D; border-bottom: 1px solid #30363D; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10;">
      <div style="padding: 20px;">
        <div style="color: #F89820; font-size: 28px; margin-bottom: 10px;"><i class="fa-solid fa-shield-halved"></i></div>
        <div style="color: #FFFFFF; font-weight: 700; font-size: 18px; margin-bottom: 4px;">PMD</div>
        <div style="color: #8B949E; font-size: 13px; font-family: 'Roboto Mono', monospace;">Calidad</div>
      </div>
    </div>

    <div class="card-accent-jacoco" data-object="true" data-object-type="shape" style="position: absolute; left: 650px; top: 480px; width: 250px; height: 140px; background-color: #161B22; border-radius: 0 0 8px 8px; border-left: 1px solid #30363D; border-right: 1px solid #30363D; border-bottom: 1px solid #30363D; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10;">
      <div style="padding: 20px;">
        <div style="color: #2EA44F; font-size: 28px; margin-bottom: 10px;"><i class="fa-solid fa-chart-bar"></i></div>
        <div style="color: #FFFFFF; font-weight: 700; font-size: 18px; margin-bottom: 4px;">JaCoCo</div>
        <div style="color: #8B949E; font-size: 13px; font-family: 'Roboto Mono', monospace;">Cobertura</div>
      </div>
    </div>

    <div class="card-accent-pit" data-object="true" data-object-type="shape" style="position: absolute; left: 925px; top: 480px; width: 255px; height: 140px; background-color: #161B22; border-radius: 0 0 8px 8px; border-left: 1px solid #30363D; border-right: 1px solid #30363D; border-bottom: 1px solid #30363D; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10;">
      <div style="padding: 20px;">
        <div style="color: #DA3633; font-size: 28px; margin-bottom: 10px;"><i class="fa-solid fa-dna"></i></div>
        <div style="color: #FFFFFF; font-weight: 700; font-size: 18px; margin-bottom: 4px;">PIT</div>
        <div style="color: #8B949E; font-size: 13px; font-family: 'Roboto Mono', monospace;">Mutación</div>
      </div>
    </div>

    <!-- Footer -->
    <div data-object="true" data-object-type="textbox" style="position: absolute; right: 40px; bottom: 25px; width: 350px; text-align: right; z-index: 10;">
      <span style="font-family: 'Roboto Mono', monospace; font-size: 11px; color: #484F58;">
        DOPO • Análisis de Software • Eclipse IDE
      </span>
    </div>

    <!-- Barra bottom tricolor -->
    <div data-object="true" data-object-type="shape" style="position: absolute; left: 0; bottom: 0; width: 1280px; height: 6px; display: flex; z-index: 20;">
      <div style="flex: 1; background-color: #F89820;"></div>
      <div style="flex: 1; background-color: #7C5CBF;"></div>
      <div style="flex: 1; background-color: #58A6FF;"></div>
    </div>
  </div>
</body>
</html>
