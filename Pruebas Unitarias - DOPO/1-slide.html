<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pruebas Unitarias en Java</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&amp;family=Roboto:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #003366; /* Deep Blue base */
            font-family: 'Roboto', sans-serif;
        }
        
        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            position: relative;
            background-color: #003366; /* Main Background */
            color: white;
            overflow: hidden;
        }
        
        /* Left Accent Bar */
        .left-bar {
            width: 180px;
            height: 100%;
            background-color: #1565c0; /* Lighter Blue */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            box-sizing: border-box;
            z-index: 10;
            box-shadow: 4px 0 10px rgba(0,0,0,0.2);
        }

        /* Content Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 80px;
            padding-right: 60px;
            z-index: 5;
        }

        /* Typography */
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 4.8rem;
            line-height: 1.1;
            margin: 0 0 20px 0;
            color: white;
            text-transform: uppercase;
        }

        .highlight-orange {
            color: #f89820; /* Java Orange */
        }

        .subtitle {
            font-family: 'Roboto', sans-serif;
            font-size: 2.2rem;
            font-weight: 300;
            color: #e3f2fd;
            margin: 0 0 40px 0;
        }

        /* Decorative Elements */
        .deco-line {
            width: 150px;
            height: 8px;
            background-color: #f89820;
            margin-bottom: 40px;
        }

        .badge {
            background-color: #f89820;
            color: #003366;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 30px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* Author Section */
        .author-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .author-avatar {
            width: 60px;
            height: 60px;
            background-color: #1565c0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #f89820;
        }

        .author-info p {
            margin: 0;
        }

        .author-name {
            font-weight: 700;
            font-size: 1.4rem;
            color: white;
        }

        .author-role {
            font-weight: 300;
            font-size: 1rem;
            color: #bbdefb;
        }

        /* Background Shapes (No Gradients) */
        .circle-bg {
            position: absolute;
            right: -150px;
            top: -100px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            border: 60px solid #0d47a1;
            opacity: 0.3;
            z-index: 1;
        }

        .square-bg {
            position: absolute;
            bottom: 50px;
            right: 100px;
            width: 200px;
            height: 200px;
            border: 4px solid #f89820;
            opacity: 0.1;
            transform: rotate(15deg);
            z-index: 1;
        }

        /* Tech Icons in Sidebar */
        .icon-box {
            display: flex;
            flex-direction: column;
            gap: 40px;
            color: white;
            font-size: 2.5rem;
            opacity: 0.9;
        }

        .java-icon { color: #f89820; }
        .test-icon { color: #81c784; } /* Green for passing tests */
        .bluej-icon { color: #4fc3f7; }

    </style>
</head>
<body>
<div class="slide-container">
<!-- Sidebar Navigation/Icons -->
<div class="left-bar">
<div style="font-size: 2rem; font-weight: bold; color: white;">
<i class="fas fa-university"></i>
</div>
<div class="icon-box">
<i class="fab fa-java java-icon"></i>
<i class="fas fa-vial test-icon"></i>
<i class="fas fa-cube bluej-icon"></i>
</div>
<div style="font-size: 1rem; opacity: 0.5;">
                2026
            </div>
</div>
<!-- Main Content -->
<div class="main-content">
<!-- Badge -->
<div>
<p class="badge">DOPO</p>
</div>
<!-- Title -->
<h1>
                Pruebas Unitarias<br/>
                en <span class="highlight-orange">Java</span> con<br/>
                JUnit y BlueJ
            </h1>
<!-- Decorative Line -->
<div class="deco-line"></div>
<!-- Subtitle -->
<p class="subtitle">Asegurando la calidad en DOPO</p>
<!-- Author -->
<div class="author-container">
<div class="author-avatar">
<i class="fas fa-user text-white text-xl"></i>
</div>
<div class="author-info">
<p class="author-name">Andersson David Sánchez Méndez</p>
<p class="author-role">Monitor MYSD &amp; DOPO</p>
</div>
</div>
</div>
<!-- Background Abstract Elements -->
<div class="circle-bg"></div>
<div class="square-bg"></div>
</div>
</body>
</html>
