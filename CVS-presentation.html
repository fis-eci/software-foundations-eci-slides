      position: fixed;
      top: 0; left: 0; right: 0; bottom: 52px;

    }

    #slide-frame {
      position: absolute;
      top: 0; left: 0;
      width: 1280px;
      height: 720px;
      border: none;
      display: block;
      transform-origin: top left;
      /* transform is set dynamically by scaleSlide() */
    }

    /* Progress bar sits just above the nav bar */
    #progress-wrap {
      position: fixed;
      bottom: 52px; left: 0; right: 0;
      height: 3px;
      background: #21262d;
      z-index: 9998;
    }
    #progress-bar {
      height: 100%;
      background: #58a6ff;
      transition: width 0.2s ease;
    }

    /* Navigation bar */
    #nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(13, 17, 23, 0.97);
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      z-index: 9999;
    }

      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px 13px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .nbtn:hover  { background: #30363d; }
    .nbtn:disabled { opacity: 0.3; cursor: default; }

    #counter {
      color: #8b949e;
      font-size: 13px;
      flex-shrink: 0;
      min-width: 52px;
      text-align: center;
    }

    #slide-title {
      color: #c9d1d9;
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #jump-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    #jump-label { color: #8b949e; font-size: 12px; }
    #jump-input {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 13px;
      width: 48px;
      text-align: center;
    }
    #jump-input:focus { outline: none; border-color: #58a6ff; }

    #btn-fs {
      background: transparent;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 15px;
      cursor: pointer;
      flex-shrink: 0;
    }

        e.preventDefault(); goTo(TOTAL - 1);
      } else if (e.key === 'f' || e.key === 'F') {
        toggleFs();
      }
    });

    document.getElementById('btn-fs').addEventListener('click', toggleFs);

    function toggleFs() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function() {});
      } else {
        document.exitFullscreen();
      }
    }

    window.addEventListener('resize', scaleSlide);
    window.addEventListener('fullscreenchange', scaleSlide);

    /* Restore slide from URL hash, default to slide 1 */
    var h = parseInt(location.hash.slice(1), 10);
    scaleSlide();
    goTo(isNaN(h) ? 0 : h - 1);
  </script>

</body>
</html>
